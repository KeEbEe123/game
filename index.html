<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary!</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background: linear-gradient(45deg, #1a1a2e, #16213e, #0f3460);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background gradient */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Retro grid overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .title {
            font-size: clamp(2rem, 8vw, 6rem);
            color: #00ffff;
            text-align: center;
            text-shadow: 
                0 0 5px #00ffff,
                4px 4px 0px #ff00ff,
                8px 8px 0px #ffff00;
            margin-bottom: 3rem;
            animation: titleGlow 2s ease-in-out infinite alternate;
            line-height: 1.2;
            max-width: 90%;
        }

        @keyframes titleGlow {
            from { 
                text-shadow: 
                    0 0 5px #00ffff,
                    4px 4px 0px #ff00ff,
                    8px 8px 0px #ffff00;
            }
            to { 
                text-shadow: 
                    0 0 8px #00ffff,
                    4px 4px 0px #ff00ff,
                    8px 8px 0px #ffff00;
            }
        }

        .play-button {
            font-family: 'Press Start 2P', monospace;
            font-size: 2rem;
            padding: 1.5rem 3rem;
            background: linear-gradient(145deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            cursor: pointer;
            position: relative;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.1s ease;
            
            /* 3D effect */
            box-shadow: 
                0 8px 0 #cc4125,
                0 12px 10px rgba(0, 0, 0, 0.3),
                inset 0 4px 0 rgba(255, 255, 255, 0.3);
            
            border-radius: 8px;
        }

        .play-button:hover {
            background: linear-gradient(145deg, #ff7979, #fd6c6c);
            transform: translateY(-2px);
            box-shadow: 
                0 10px 0 #cc4125,
                0 15px 15px rgba(0, 0, 0, 0.4),
                inset 0 4px 0 rgba(255, 255, 255, 0.4);
        }

        .play-button:active {
            transform: translateY(4px);
            box-shadow: 
                0 4px 0 #cc4125,
                0 6px 5px rgba(0, 0, 0, 0.2),
                inset 0 2px 0 rgba(255, 255, 255, 0.2);
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ffff;
            animation: float 6s infinite linear;
            box-shadow: 0 0 6px #00ffff;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .title {
                font-size: clamp(1.5rem, 6vw, 4rem);
                margin-bottom: 2rem;
            }
            
            .play-button {
                font-size: 1.5rem;
                padding: 1rem 2rem;
            }
        }
    </style>
</head>
<body>
    <h1 class="title">HAPPY ANNIVERSARY<br>ANUSHKAAAAAA</h1>
    <button class="play-button" onclick="window.location.href='anushka.html'">PLAY</button>

    <script>
        // Create floating particles
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDelay = Math.random() * 6 + 's';
            particle.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(particle);

            // Remove particle after animation
            setTimeout(() => {
                particle.remove();
            }, 8000);
        }

        // Create particles periodically
        setInterval(createParticle, 300);

        // Add some initial particles
        for (let i = 0; i < 10; i++) {
            setTimeout(createParticle, i * 100);
        }

        // Add click sound effect (optional - requires user interaction first)
        document.querySelector('.play-button').addEventListener('click', function() {
            // Create a simple beep sound using Web Audio API
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                oscillator.frequency.setValueAtTime(600, audioContext.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.2);
            } catch (e) {
                // Fallback if Web Audio API is not supported
                console.log('Audio not supported');
            }
        });
    </script>
</body>
</html>
